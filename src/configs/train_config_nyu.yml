output_root: "."
pytorch_data_dir: "data/NYU_Depth"

log_dir: "UniM2"

project_name: "UniM2"
entity: null
group: "UniM2"

num_workers: 16
max_steps: 10000  # Must match hyperparameter search max_steps!

# Hyperparameter search settings
search_dataloader_seed: False  
search_only_seed: False  
search_lr: False  


##############Adjust Parameters Here##############
experiment_name: "UniM2_NYU"
batch_size: 32
val_batch_size: 16  # Validation/test batch size (reduce if CUDA out of memory)

gpu_ids: '0'
model_type: "vit_small"
dino_version: "v3"
dino_patch_size: 16

modals: ['rgb','depth'] # Options: 'rgb', 'depth'
nyu_num_classes: 13  

# Fusion settings for multi-modal
modality_fusion_method: "conv"  
modality_fusion_output_dim: 384  
dino_feat_type: "ori"
dim: 70
search_dim: False  # Whether to search for optimal dim during hyperparameter search (True: search, False: fixed)
# Modality-specific network settings

# Feature normalization before fusion
normalize_before_fusion: True  # Whether to normalize features before fusion
normalization_type: "l2"  # Options: "l2", "standardize", "minmax"

# Modality-specific weighting for loss calculation
use_modality_weight: False  # Global switch for modality weighting
rgb_use_weight: False  # Whether RGB modality uses weight (depth always uses weight when use_modality_weight=True)
weight_activation: "tanh"  # Options: "sigmoid", "tanh", "relu", "softmax"

use_modal_projection_head: True
rgb_use_soft_alignment: False
nonrgb_use_soft_alignment: True
###############################################

#######################
# RGB modality weights
rgb_pos_inter_weight: 0.3373
rgb_pos_intra_weight: 0.3401
rgb_neg_inter_weight: 0.4864
rgb_neg_inter_shift: 0.6673
rgb_pos_inter_shift: 0.5327
rgb_pos_intra_shift: 0.8161
rgb_weight: 0.6077
depth_pos_inter_weight: 0.9163
depth_pos_intra_weight: 0.0904
depth_neg_inter_weight: 0.5321
depth_neg_inter_shift: 0.1762
depth_pos_inter_shift: 0.1736
depth_pos_intra_shift: 0.1288
depth_weight: 0.7311

lr: 5e-4

######################## 

pretrained_weights: "pretrained/dinov3_vits16_pretrain_lvd1689m-08c60483.pth"

num_neighbors: 7
dataset_name: "nyu"

use_modality_residual: False
crop_type: "five"
crop_ratio: .5
res: 224
loader_crop_type: "center"
val_crop_type: null
val_res: 320

extra_clusters: 0
use_true_labels: False

arch: "dino"
projection_type: "nonlinear"

continuous: True

dropout: True
zero_clamp: True

use_salience: False
stabalize: False

pointwise: True
feature_samples: 11
neg_samples: 5

correspondence_weight: 1.0

rec_weight: 0.0

reset_probe_steps: ~

scalar_log_freq: 10
eval_every_n_epochs: 1
val_freq: 10

hydra:
  run:
    dir: ${output_root}
  output_subdir: null
  job_logging:
    handlers:
      file:
        filename: ${output_root}/logs/${hydra.job.name}.log
