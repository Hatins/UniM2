output_root: "."
pytorch_data_dir: "data/MCUBES"

log_dir: "UniM2"

project_name: "UniM2"
entity: null
group: "UniM2"

num_workers: 16
max_steps: 4000

# Hyperparameter search settings
search_dataloader_seed: False
search_only_seed: False
search_lr: True


##############Adjust Parameters Here##############
experiment_name: "UniM2_MCubeS_IA"
batch_size: 32
val_batch_size: 16

gpu_ids: '0'
model_type: "vit_small"
dino_version: "v3"
dino_patch_size: 16

# MCubeS available modals: 'rgb', 'nir', 'aolp', 'dolp'
modals: ['rgb','aolp']

# Fusion settings for multi-modal
modality_fusion_method: "conv"  # Options: "sum", "mean", "max", "conv"
modality_fusion_output_dim: 384  # Must match n_feats=384 for vit_small
dino_feat_type: "ori"
search_dim: True

# Feature normalization before fusion
normalize_before_fusion: True
normalization_type: "l2"

# Modality-specific weighting for loss calculation
use_modality_weight: False
rgb_use_weight: False
weight_activation: "tanh"

use_modal_projection_head: True
# Alignment ablation: control whether each modality uses soft (projected) or hard alignment
# Modes:
#   Default (RGB hard, non-RGB soft): rgb_use_soft_alignment=False, nonrgb_use_soft_alignment=True
#   All soft:                         rgb_use_soft_alignment=True,  nonrgb_use_soft_alignment=True
#   RGB soft, others hard:            rgb_use_soft_alignment=True,  nonrgb_use_soft_alignment=False
rgb_use_soft_alignment: False
nonrgb_use_soft_alignment: True
###############################################

#######################
# Per-modal weights — only the modals listed in `modals:` are active;
# the others are stored here for reference and will be ignored at runtime.
                                                                                                           
                 
# RGB modality weights
rgb_pos_inter_weight: 0.0705
rgb_pos_intra_weight: 0.2237
rgb_neg_inter_weight: 0.7443
rgb_neg_inter_shift: 0.6375
rgb_pos_inter_shift: 0.2830
rgb_pos_intra_shift: 0.7865
rgb_weight: 0.4046
aolp_pos_inter_weight: 0.5528
aolp_pos_intra_weight: 0.5756
aolp_neg_inter_weight: 0.4637
aolp_neg_inter_shift: 0.3037
aolp_pos_inter_shift: 0.6230
aolp_pos_intra_shift: 0.4694
aolp_weight: 0.3052
dim: 320
lr: 1.59e-05                                                                       



########################


pretrained_weights: "pretrained/dinov3_vits16_pretrain_lvd1689m-08c60483.pth"
# pretrained_weights: "pretrained/dinov3_vitb16_pretrain_lvd1689m-73cec8be.pth"
# pretrained_weights: "pretrained/dinov3_vits16plus_pretrain_lvd1689m-4057cbaa.pth"

num_neighbors: 7
dataset_name: "mcubes"

use_modality_residual: False
crop_type: "five"
crop_ratio: .5
res: 224
loader_crop_type: "center"
val_crop_type: null
val_res: 320

extra_clusters: 0
use_true_labels: False

arch: "dino"
projection_type: "nonlinear"

continuous: True

dropout: True
zero_clamp: True

use_salience: False
stabalize: False

pointwise: True
feature_samples: 11
neg_samples: 5

correspondence_weight: 1.0

rec_weight: 0.0

reset_probe_steps: ~

scalar_log_freq: 10
eval_every_n_epochs: 1
val_freq: 5

hydra:
  run:
    dir: ${output_root}
  output_subdir: null
  job_logging:
    handlers:
      file:
        filename: ${output_root}/logs/${hydra.job.name}.log
